<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Dub Editor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: white;
      font-weight: bold;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 16px;
      margin-top: 10px;
    }

    .error {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 20px;
      padding: 0 40px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="logo">D</div>
    <div class="spinner"></div>
    <p class="loading-text">等待打开...</p>
  </div>

  <script>
    // Capacitor 会在原生应用中自动注入，无需手动加载
    // 如果在浏览器中测试，可以使用 npx cap serve
  </script>

  <script>
    const loading = document.getElementById('loading');

    // 直接跳转到目标 URL
    function loadUrl(url) {
      console.log('跳转到:', url);
      window.location.href = url;
    }

    // 显示错误信息
    function showError(message) {
      loading.innerHTML = `
        <div class="logo">D</div>
        <p class="error">${message}</p>
      `;
    }

    // 初始化 Capacitor
    async function initCapacitor() {
      console.log('开始初始化 Capacitor');

      // 等待 Capacitor 加载
      let retries = 0;
      while (!window.Capacitor && retries < 20) {
        await new Promise(resolve => setTimeout(resolve, 100));
        retries++;
      }

      if (!window.Capacitor) {
        console.error('Capacitor 未加载');
        showError('应用初始化失败，请重试');
        return;
      }

      console.log('Capacitor 已加载');

      try {
        const { App } = window.Capacitor.Plugins;

        if (!App) {
          console.error('App 插件未找到');
          showError('应用插件加载失败');
          return;
        }

        // 监听 Deep Link（热启动）
        App.addListener('appUrlOpen', (data) => {
          console.log('接收到 Deep Link:', data.url);

          try {
            const url = new URL(data.url);
            const targetUrl = url.searchParams.get('url');

            if (targetUrl) {
              loadUrl(decodeURIComponent(targetUrl));
            }
          } catch (e) {
            console.error('解析 Deep Link 失败:', e);
            showError('链接解析失败');
          }
        });

        // 检查启动 URL（冷启动）
        const result = await App.getLaunchUrl();
        console.log('getLaunchUrl 结果:', result);

        if (result && result.url) {
          console.log('启动 URL:', result.url);

          try {
            const url = new URL(result.url);
            const targetUrl = url.searchParams.get('url');

            if (targetUrl) {
              loadUrl(decodeURIComponent(targetUrl));
            } else {
              showError('请从 Web 页面点击链接打开');
            }
          } catch (e) {
            console.error('解析启动 URL 失败:', e);
            showError('链接格式错误');
          }
        } else {
          showError('请从 Web 页面点击链接打开');
        }
      } catch (e) {
        console.error('初始化失败:', e);
        showError('应用初始化失败: ' + e.message);
      }
    }

    // 页面加载完成后初始化
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initCapacitor);
    } else {
      initCapacitor();
    }
  </script>
</body>
</html>
