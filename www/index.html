<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Dub Editor</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 30px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: white;
      font-weight: bold;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #666;
      font-size: 16px;
      margin-top: 10px;
    }

    .error {
      color: #e74c3c;
      font-size: 14px;
      margin-top: 20px;
      padding: 0 40px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="logo">D</div>
    <div class="spinner"></div>
    <p class="loading-text">等待打开...</p>
  </div>

  <script>
    // Capacitor 会在原生应用中自动注入，无需手动加载
    // 如果在浏览器中测试，可以使用 npx cap serve
  </script>

  <script>
    const loading = document.getElementById('loading');

    // 直接跳转到目标 URL
    function loadUrl(url) {
      console.log('跳转到:', url);
      // 直接替换当前页面
      window.location.href = url;
    }

    // 等待 Capacitor 加载
    document.addEventListener('deviceready', () => {
      console.log('Capacitor 已就绪');

      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
        const App = window.Capacitor.Plugins.App;

        // 监听 Deep Link（热启动）
        App.addListener('appUrlOpen', (data) => {
          console.log('接收到 Deep Link:', data.url);

          try {
            const url = new URL(data.url);
            const targetUrl = url.searchParams.get('url');

            if (targetUrl) {
              loadUrl(decodeURIComponent(targetUrl));
            }
          } catch (e) {
            console.error('解析失败:', e);
          }
        });

        // 检查启动 URL（冷启动）
        App.getLaunchUrl().then(result => {
          if (result && result.url) {
            console.log('启动 URL:', result.url);

            try {
              const url = new URL(result.url);
              const targetUrl = url.searchParams.get('url');

              if (targetUrl) {
                loadUrl(decodeURIComponent(targetUrl));
              } else {
                loading.innerHTML = `
                  <div class="logo">D</div>
                  <p class="error">请从 Web 页面点击链接打开</p>
                `;
              }
            } catch (e) {
              console.error('解析启动 URL 失败:', e);
              loading.innerHTML = `
                <div class="logo">D</div>
                <p class="error">请从 Web 页面点击链接打开</p>
              `;
            }
          } else {
            loading.innerHTML = `
              <div class="logo">D</div>
              <p class="error">请从 Web 页面点击链接打开</p>
            `;
          }
        });
      }
    }, false);

    // 如果 deviceready 没触发，使用备用方案
    setTimeout(() => {
      if (loading.style.display !== 'none') {
        document.dispatchEvent(new Event('deviceready'));
      }
    }, 1000);
  </script>
</body>
</html>
